llm:
  # 当前后端：ollama / openai / anthropic
  # 从环境变量 LLM_PROVIDER 读取，默认 ollama
  provider: "${LLM_PROVIDER:-ollama}"
  max_iterations: 10

  # Ollama 配置（本地免费）
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen3.5:0.8b"

  # OpenAI 配置（付费）
  openai:
    api_key: "${OPENAI_API_KEY}"
    model: "${OPENAI_MODEL:-gpt-4o-mini}"
    base_url: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"

  # Anthropic 配置（付费）
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    model: "${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}"

# MCP Server 配置
mcp:
  servers:
    # 文件系统 MCP Server（Python 版，不依赖 Node.js）
    filesystem:
      enabled: true
      transport: "stdio"
      command: "python"
      args: ["servers/filesystem_server.py", "."]
      description: "文件系统操作（读写、搜索、目录管理）"

    # GitHub MCP Server（需要 Node.js）
    github:
      enabled: false
      transport: "stdio"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-github"]
      env:
        GITHUB_TOKEN: "${GITHUB_TOKEN}"
      description: "GitHub 操作（Issues / PR / Repos）"

    # 自定义 MCP Server（HTTP + SSE）
    # custom:
    #   enabled: false
    #   transport: "http"
    #   url: "http://localhost:3000/sse"
    #   description: "自定义 MCP Server"
