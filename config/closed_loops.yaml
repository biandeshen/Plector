# 闭环系统配置 — 事件驱动的自治工作流
# 每个闭环：trigger_on（触发事件）→ entry（入口节点）→ nodes（DAG 节点链）

# L1: 测试失败 → 记录并分类错误
error_record_loop:
  trigger_on: ["test.failed"]
  entry: "record_error"
  max_iterations: 2
  nodes:
    record_error:
      type: "skill"
      skill: "error_knowledge"
      method: "store_error"
      params_from: "payload"
      next: "classify_error"
    classify_error:
      type: "skill"
      skill: "error_knowledge"
      method: "classify_error"
      params_from: "payload"
      next: "end"
    end:
      type: "end"

# L2: 技能健康降级 → 全系统健康检查
health_check_loop:
  trigger_on: ["health.degraded"]
  entry: "check_health"
  max_iterations: 3
  nodes:
    check_health:
      type: "skill"
      skill: "health_monitor"
      method: "check_health"
      next: "end"
    end:
      type: "end"

# L3: 上下文保鲜完成 → 语义搜索关联记忆，增强上下文
context_refresh_loop:
  trigger_on: ["context.refreshed"]
  entry: "semantic_search"
  max_iterations: 2
  nodes:
    semantic_search:
      type: "skill"
      skill: "memory"
      method: "semantic_search"
      params_from: "payload"
      next: "save_enriched"
    save_enriched:
      type: "skill"
      skill: "memory"
      method: "save_knowledge"
      params_from: "last_result"
      next: "end"
    end:
      type: "end"

# L4: 复杂任务检测 → 搜索领域知识，提供上下文支持
complex_task_loop:
  trigger_on: ["complexity.detected"]
  entry: "search_knowledge"
  max_iterations: 2
  nodes:
    search_knowledge:
      type: "skill"
      skill: "memory"
      method: "search_knowledge"
      params_from: "payload"
      next: "end"
    end:
      type: "end"

# L5: 技能健康降级 → 记录失败、分类、检查整体健康
skill_failure_loop:
  trigger_on: ["health.degraded"]
  entry: "store_failure"
  max_iterations: 3
  nodes:
    store_failure:
      type: "skill"
      skill: "error_knowledge"
      method: "store_error"
      params_from: "payload"
      next: "classify_failure"
    classify_failure:
      type: "skill"
      skill: "error_knowledge"
      method: "classify_error"
      params_from: "payload"
      next: "check_system_health"
    check_system_health:
      type: "skill"
      skill: "health_monitor"
      method: "check_health"
      next: "end"
    end:
      type: "end"

# L6: 闭环执行失败 → 记录并分类失败原因，驱动自我改进
self_improve_loop:
  trigger_on: ["closure_loop.failed"]
  entry: "store_loop_error"
  max_iterations: 2
  nodes:
    store_loop_error:
      type: "skill"
      skill: "error_knowledge"
      method: "store_error"
      params_from: "payload"
      next: "classify_loop_error"
    classify_loop_error:
      type: "skill"
      skill: "error_knowledge"
      method: "classify_error"
      params_from: "payload"
      next: "end"
    end:
      type: "end"
