name: Plector Self-Improvement
description: Plector 自主升级工作流 - 多角色协作完成 v2.0 升级
version: 1.0.0
trigger:
  type: manual
  # 由 skills/self_improver 技能触发

roles:
  - planner:
      workflow: self_improve/planner.yaml
      instances: 1
  - coder:
      workflow: self_improve/coder.yaml
      instances: 2
      # 2个 coder 实例并行处理不同任务
  - tester:
      workflow: self_improve/tester.yaml
      instances: 1
  - reviewer:
      workflow: self_improve/reviewer.yaml
      instances: 1

event_topics:
  # 任务生命周期
  self_improve.task.assigned:    # Planner → Coder
  self_improve.task.completed:   # Coder → Tester
  self_improve.task.failed:      # Coder → Planner（重分配）
  self_improve.test.passed:      # Tester → Reviewer
  self_improve.test.failed:      # Tester → Coder（修复）
  # Phase 生命周期
  self_improve.phase.started:    # 新 Phase 开始
  self_improve.phase.completed:  # 所有任务完成，等待审查
  self_improve.phase.approved:   # Reviewer 通过
  self_improve.phase.rejected:   # Reviewer 拒绝，需要修复

flow:
  # Phase 1: GSD 上下文保鲜
  phase_1:
    name: "Phase 1: 核心稳定性 + GSD 上下文保鲜"
    roles:
      - planner: analyze_and_assign
      - coder: [context_refresher_skill, vector_memory_update]
      - tester: run_tests
      - reviewer: review_phase_1

  # Phase 2: LangGraph 工作流
  phase_2:
    name: "Phase 2: 性能优化 + LangGraph 工作流"
    roles:
      - planner: analyze_and_assign
      - coder: [workflow_graph_impl, conditional_chain_migration]
      - tester: run_tests
      - reviewer: review_phase_2

  # Phase 3: CrewAI 角色委派
  phase_3:
    name: "Phase 3: 模块化重构 + CrewAI 角色委派"
    roles:
      - planner: analyze_and_assign
      - coder: [mcp_modular, agent_loop_v2, role_delegator]
      - tester: run_tests
      - reviewer: review_phase_3

  # Phase 4: 可观测性
  phase_4:
    name: "Phase 4: 可观测性建设"
    roles:
      - planner: analyze_and_assign
      - coder: [health_endpoint, metrics, tracing]
      - tester: run_tests
      - reviewer: review_phase_4

  # Phase 5: 企业级功能
  phase_5:
    name: "Phase 5: 企业级功能 + DeerFlow 运行时"
    roles:
      - planner: analyze_and_assign
      - coder: [checkpoint, sandbox, multi_tenant]
      - tester: run_tests
      - reviewer: review_phase_5

concurrency:
  coder: 2  # 2个 coder 并行
  tester: 1
  planner: 1
  reviewer: 1

checkpoint:
  enabled: true
  path: "data/checkpoints/self_improve"
  frequency: after_each_task
