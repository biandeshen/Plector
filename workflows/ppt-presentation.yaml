name: plector-ppt-generator
description: |
  Plector 项目介绍 PPT 生成工作流：
  1. 产品经理分析项目定位
  2. 架构师设计 PPT 结构
  3. UI 设计师美化视觉效果
  4. 内容创作者撰写文案
  5. 演示专家优化演示效果

roles:
  - product_manager
  - architect
  - ui_designer
  - content_writer
  - presentation_expert

steps:
  # Step 1: 产品经理分析项目定位和核心价值
  pm_analysis:
    role: product_manager
    description: 分析 Plector 项目定位、核心价值主张、目标用户
    output: project_positioning.md
    prompt: |
      # 项目分析任务
      
      分析 Plector 项目的以下内容，并输出分析报告：
      
      ## 项目概述
      Plector 是一个事件驱动的 AI Agent 引擎，支持技能治理和闭环自愈。
      
      ## 核心功能
      - ReAct 自主决策循环
      - 多 LLM 后端支持（Ollama/OpenAI/Anthropic）
      - 技能系统：插件化技能，MCP 格式定义
      - 事件驱动：CloudEvents 1.0，组件异步解耦
      - MCP 协议：连接外部 MCP Server，引入现成工具
      - 闭环引擎：条件图执行，支持自动修复
      - Harness：7 项自动化检查，约柬代码质量
      
      ## 当前数据
      - 当前版本：v1.8.0
      - 技能：9 个 | 工具：49 个 | 核心模块：13 个
      
      ## 输出要求
      请生成一份包含以下内容的 Markdown 报告：
      1. 项目定位（是什么、解决什么问题）
      2. 核心价值主张（3-5 个亮点）
      3. 目标用户（谁会使用）
      4. 竞品对比（类似项目有哪些，优势在哪里）
      
      输出文件：project_positioning.md

  # Step 2: 架构师设计 PPT 结构
  architect_design:
    role: architect
    description: 设计 PPT 的整体结构、页面布局、逻辑流程
    input: project_positioning.md
    output: ppt_structure.md
    prompt: |
      # PPT 结构设计任务
      
      基于项目分析报告，设计 PPT 的整体结构。
      
      ## 输入
      读取 project_positioning.md 获取项目定位信息。
      
      ## 设计要求
      设计一份 10-15 页的 PPT 结构，包含：
      
      1. **封面页** - 项目名称、口号
      2. **项目概述** - 是什么、做什么的
      3. **核心架构** - 技术架构图描述
      4. **核心功能 1** - ReAct 自主决策
      5. **核心功能 2** - 事件驱动架构
      6. **核心功能 3** - 技能系统
      7. **核心功能 4** - MCP 协议集成
      8. **核心功能 5** - 闭环自愈
      9. **技术亮点** - 代码质量、测试覆盖等
      10. **应用场景** - 使用案例
      11. **下一步规划** - 未来方向
      12. **Q&A / 结束页**
      
      ## 输出
      每页 PPT 需要包含：
      - 页面标题
      - 内容要点（3-5 个 bullet points）
      - 视觉建议（图表类型、配色建议）
      
      输出文件：ppt_structure.md

  # Step 3: UI 设计师美化视觉效果
  ui_design:
    role: ui_designer
    description: 设计 PPT 的视觉风格、配色方案、排版规范
    input: ppt_structure.md
    output: visual_design.md
    prompt: |
      # PPT 视觉设计任务
      
      基于 PPT 结构，设计视觉风格指南。
      
      ## 输入
      读取 ppt_structure.md 获取页面结构。
      
      ## 设计要求
      设计一套完整的视觉风格规范：
      
      1. **配色方案**
         - 主色调（科技感、简洁）
         - 辅助色
         - 强调色
         - 提供具体的 Hex 色值
         
      2. **字体规范**
         - 标题字体
         - 正文字体
         - 代码/技术字体
         
      3. **布局规范**
         - 页面边距
         - 元素间距
         - 对齐方式
         
      4. **图标风格**
         - 推荐使用的图标库
         - 图标大小规范
         
      5. **每页视觉建议**
         - 根据 ppt_structure.md 中的每一页，给出具体的视觉设计建议
         
      ## 输出
      输出文件：visual_design.md

  # Step 4: 内容创作者撰写文案
  content_creation:
    role: content_writer
    description: 为每一页 PPT 撰写详细的文案内容
    input: 
      - ppt_structure.md
      - project_positioning.md
      - visual_design.md
    output: ppt_content.md
    prompt: |
      # PPT 内容撰写任务
      
      基于结构、定位和视觉设计，撰写每一页的详细内容。
      
      ## 输入
      - ppt_structure.md：页面结构
      - project_positioning.md：项目定位
      - visual_design.md：视觉设计指南
      
      ## 撰写要求
      为每一页撰写完整的 PPT 文案，包括：
      
      1. **封面页**
         - 主标题
         - 副标题/口号
         - 演讲者信息占位
         
      2. **内容页**
         - 页面标题
         - 详细文案（用于演讲稿）
         - 关键数据/数字
         - 图表描述
         
      3. **结束页**
         - 总结语
         - 联系方式
         - 致谢语
      
      ## 风格要求
      - 简洁有力，避免冗长
      - 使用数据支撑观点
      - 适当使用技术术语展示专业性
      - 保持与视觉设计的一致性
      
      ## 输出
      输出文件：ppt_content.md（包含每一页的完整文案）

  # Step 5: 演示专家优化演示效果
  presentation_optimize:
    role: presentation_expert
    description: 生成最终的 PPT 脚本和演讲提示
    input: 
      - ppt_content.md
      - ppt_structure.md
      - visual_design.md
    output: ppt_final.md
    prompt: |
      # PPT 最终整合任务
      
      整合所有内容，生成最终的 PPT 演示材料。
      
      ## 输入
      - ppt_content.md：完整文案
      - ppt_structure.md：页面结构
      - visual_design.md：视觉设计
      
      ## 整合要求
      生成一份完整的 PPT 演示文档：
      
      1. **文档格式**
         - 每页一个清晰的标题
         - 内容要点（用于幻灯片显示）
         - 演讲备注（用于演讲者参考）
         
      2. **演讲脚本**
         - 为每一页提供 30-60 秒的演讲内容
         - 标注关键停顿点
         - 标注需要切换幻灯片的时机
         
      3. **时间控制**
         - 估算总演讲时间
         - 每页建议时间分配
         
      4. **互动提示**
         - 哪里可以与观众互动
         - 哪里需要展示 Demo
         - Q&A 环节准备
      
      ## 输出
      输出文件：ppt_final.md（可直接用于演示的完整文档）

# 输出文件汇总
outputs:
  - project_positioning.md    # 项目定位分析
  - ppt_structure.md         # PPT 结构设计
  - visual_design.md         # 视觉设计指南
  - ppt_content.md           # 内容文案
  - ppt_final.md             # 最终演示材料
