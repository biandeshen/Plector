<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plector Dashboard</title>
<script src="https://cdn.bootcdn.net/ajax/libs/marked/9.0.0/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface-2: #0f172a;
  --border: #334155;
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --text-weak: #64748b;
  --accent: #38bdf8;
  --accent-dim: rgba(56, 189, 248, 0.15);
  --green: #22c55e;
  --green-bg: #052e16;
  --yellow: #f59e0b;
  --yellow-bg: #422006;
  --red: #ef4444;
  --red-bg: #450a0a;
  --btn: #3b82f6;
  --btn-hover: #2563eb;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
}
.header .status {
  font-size: 13px;
  color: var(--text-muted);
}
.header .dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  background: var(--green);
}
.header .dot.off { background: var(--red); }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-top {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.new-chat-btn {
  width: 100%;
  padding: 10px 16px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}
.new-chat-btn:hover { opacity: 0.85; }
.conversations-header {
  padding: 12px 16px 8px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.conversations-header button {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
}
.conversations-header button:hover { color: var(--text); }
.conversations-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
}
.conversation-item {
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  color: var(--text);
  transition: background 0.15s;
}
.conversation-item:hover { background: var(--surface-2); }
.conversation-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); }
.conversation-item .title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.conversation-item .delete-btn {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
}
.conversation-item:hover .delete-btn { opacity: 1; }
.conversation-item .delete-btn:hover { color: var(--red); background: rgba(255,107,107,0.1); }
.sidebar-sections {
  border-top: 1px solid var(--border);
  overflow-y: auto;
  max-height: 40vh;
}
.panel { border-bottom: 1px solid var(--border); }
.panel-header {
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}
.panel-header:hover { background: var(--surface-2); }
.panel-body { padding: 0 16px 12px; }
.panel-body.hide { display: none; }
.health-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.health-item {
  background: var(--surface-2);
  border-radius: 6px;
  padding: 10px;
  text-align: center;
}
.health-item .label { font-size: 11px; color: var(--text-muted); }
.health-item .value {
  font-size: 20px;
  font-weight: 700;
  font-family: var(--font-mono);
}
.health-item .bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.health-item .bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}
.item-list { list-style: none; }
.item-list li {
  padding: 8px 12px;
  border-radius: 4px;
  margin-bottom: 4px;
  background: var(--surface-2);
  font-size: 13px;
  display: flex;
  justify-content: space-between;
}
.item-list li .badge {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 10px;
  background: var(--accent-dim);
  color: var(--accent);
}
.chat-area { flex: 1; display: flex; flex-direction: column; }
.messages { flex: 1; overflow-y: auto; padding: 20px; }
.message { margin-bottom: 16px; max-width: 80%; animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { margin-left: auto; text-align: right; }
.message .role {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
}
.message .content {
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
/* Markdown rendered content */
.message .content p { margin: 0 0 8px; }
.message .content p:last-child { margin-bottom: 0; }
.message .content code {
  background: rgba(0,0,0,0.3);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
}
.message .content pre {
  background: #1a1a2e;
  border-radius: 8px;
  padding: 12px;
  margin: 8px 0;
  overflow-x: auto;
}
.message .content pre code {
  background: none;
  padding: 0;
  font-size: 13px;
  line-height: 1.5;
}
.message .content ul, .message .content ol {
  margin: 8px 0;
  padding-left: 24px;
}
.message .content li { margin: 4px 0; }
.message .content table {
  border-collapse: collapse;
  margin: 8px 0;
  width: 100%;
}
.message .content th, .message .content td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.message .content th { background: rgba(0,0,0,0.2); }
.message .content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-muted);
}
/* Message action buttons */
.message .actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  opacity: 0;
  transition: opacity 0.2s;
}
.message:hover .actions { opacity: 1; }
.message .actions button {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}
.message .actions button:hover {
  background: var(--surface);
  color: var(--text);
  border-color: var(--accent);
}
.message.assistant .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px 12px 12px 4px;
}
.message.user .content {
  background: var(--accent-dim);
  border: 1px solid rgba(78, 205, 196, 0.3);
  border-radius: 12px 12px 4px 12px;
}
.message.thinking .content {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-style: italic;
}
.message.error .content {
  background: rgba(255, 107, 107, 0.1);
  border: 1px solid rgba(255, 107, 107, 0.3);
  color: var(--red);
}
/* 流式光标 */
.streaming-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent);
  animation: blink 1s infinite;
  vertical-align: text-bottom;
}
@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}
/* 工具调用卡片 */
.tool-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin: 8px 0;
  max-width: 80%;
}
.tool-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--surface-2);
}
.tool-card-header .tool-icon { font-size: 14px; }
.tool-card-header .tool-name {
  font-weight: 600;
  color: var(--accent);
}
.tool-card-header .tool-status {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
}
.tool-status.executing {
  background: rgba(255, 217, 61, 0.2);
  color: var(--yellow);
}
.tool-status.done {
  background: var(--accent-dim);
  color: var(--accent);
}
.tool-card-result {
  padding: 8px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  border-top: 1px solid var(--border);
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
}
.input-area {
  padding: 16px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
}
.input-area textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-sans);
  resize: none;
  outline: none;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 0 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.input-area button:hover { opacity: 0.85; }
.input-area button:disabled { opacity: 0.4; }
.event-item {
  padding: 6px 10px;
  margin-bottom: 4px;
  background: var(--surface-2);
  border-radius: 4px;
  font-size: 12px;
  font-family: var(--font-mono);
}
.event-item .time { color: var(--text-muted); }
.event-item .type { color: var(--accent); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ============ Header Nav ============ */
.header-nav {
  display: flex;
  gap: 8px;
  margin: 0 auto;
}

.nav-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}

.nav-btn:hover {
  background: var(--surface-2);
  color: var(--text);
}

.nav-btn.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}
</style>
</head>
<body>

<div class="header">
  <h1>Plector</h1>
  <nav class="header-nav">
    <a href="/" class="nav-btn active" id="nav-dashboard">监控</a>
    <a href="/chat" class="nav-btn" id="nav-chat">对话</a>
  </nav>
  <div class="status">
    <span class="dot" id="ws-dot"></span>
    <span id="ws-status">连接中...</span>
    &nbsp;|&nbsp;
    <span id="llm-provider">--</span>
    &nbsp;|&nbsp;
    <span id="tools-count">-- tools</span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-sections" style="flex:1;overflow-y:auto;">
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">系统健康 <span>▼</span></div>
        <div class="panel-body">
          <div class="health-grid">
            <div class="health-item">
              <div class="label">CPU</div>
              <div class="value" id="cpu-value">--</div>
              <div class="bar"><div class="bar-fill" id="cpu-bar"></div></div>
            </div>
            <div class="health-item">
              <div class="label">内存</div>
              <div class="value" id="mem-value">--</div>
              <div class="bar"><div class="bar-fill" id="mem-bar"></div></div>
            </div>
            <div class="health-item">
              <div class="label">磁盘</div>
              <div class="value" id="disk-value">--</div>
              <div class="bar"><div class="bar-fill" id="disk-bar"></div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">技能 <span>▼</span></div>
        <div class="panel-body">
          <ul class="item-list" id="skills-list"></ul>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">工具 <span>▼</span></div>
        <div class="panel-body">
          <ul class="item-list" id="tools-list"></ul>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">事件日志 <span>▼</span></div>
        <div class="panel-body" style="max-height:300px;overflow-y:auto;">
          <div id="events-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// Pure Monitoring Dashboard - No chat functionality
let ws = null;
let reconnectTimer = null;
let reconnectAttempt = 0;

// Connect WebSocket just for status display (events are polled via REST)
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {
    document.getElementById('ws-dot').className = 'dot';
    document.getElementById('ws-status').textContent = '已连接';
    reconnectAttempt = 0;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };
  ws.onerror = () => {
    document.getElementById('ws-dot').className = 'dot off';
    document.getElementById('ws-status').textContent = '连接错误';
  };
  ws.onclose = () => {
    document.getElementById('ws-dot').className = 'dot off';
    document.getElementById('ws-status').textContent = '已断开';
    scheduleReconnect();
  };
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  const delays = [3000, 6000, 12000, 30000];
  const delay = delays[Math.min(reconnectAttempt, delays.length - 1)];
  reconnectAttempt++;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connect();
  }, delay);
}

// Helper functions
async function fetchApi(url) {
  try { return await (await fetch(url)).json(); } catch { return null; }
}

function barColor(v) { return v < 60 ? 'var(--green)' : v < 80 ? 'var(--yellow)' : 'var(--red)'; }

function togglePanel(header) {
  header.nextElementSibling.classList.toggle('hide');
}

// Update functions
async function updateHealth() {
  const d = await fetchApi('/api/health');
  if (!d) return;
  ['cpu', 'mem', 'disk'].forEach(k => {
    document.getElementById(k + '-value').textContent = d[k === 'mem' ? 'memory' : k] + '%';
    const bar = document.getElementById(k + '-bar');
    bar.style.width = d[k === 'mem' ? 'memory' : k] + '%';
    bar.style.background = barColor(d[k === 'mem' ? 'memory' : k]);
  });
}

async function updateSkills() {
  const d = await fetchApi('/api/skills');
  if (!d) return;
  document.getElementById('skills-list').innerHTML = d.skills.map(s =>
    '<li><span>' + s.name + '</span><span class="badge">' + s.tools.length + ' tools</span></li>'
  ).join('');
}

async function updateTools() {
  const d = await fetchApi('/api/tools');
  if (!d) return;
  document.getElementById('tools-list').innerHTML = [
    ...d.local.map(t => '<li><span>' + t.name + '</span><span class="badge">local</span></li>'),
    ...d.mcp.map(t => '<li><span>' + t.name + '</span><span class="badge">mcp</span></li>'),
  ].join('');
  document.getElementById('tools-count').textContent = d.total + ' tools';
}

async function updateConfig() {
  const d = await fetchApi('/api/config');
  if (d) document.getElementById('llm-provider').textContent = d.llm_provider.toUpperCase();
}

async function updateEvents() {
  const d = await fetchApi('/api/events');
  if (!d) return;
  document.getElementById('events-list').innerHTML = d.events.slice(-20).reverse().map(e => {
    const t = e.time.split('T')[1].split('.')[0];
    return '<div class="event-item"><span class="time">' + t + '</span> <span class="type">' + e.type + '</span></div>';
  }).join('');
}

// Init
connect();
updateHealth(); updateSkills(); updateTools(); updateConfig();
setInterval(updateHealth, 5000);
setInterval(updateEvents, 3000);
</script>
</body>
</html>
