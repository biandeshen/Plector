<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plector Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface-2: #242424;
  --border: #333;
  --text: #e0e0e0;
  --text-muted: #888;
  --accent: #4ecdc4;
  --accent-dim: rgba(78, 205, 196, 0.15);
  --green: #4ecdc4;
  --yellow: #ffd93d;
  --red: #ff6b6b;
  --font-mono: 'Cascadia Code', 'Fira Code', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
}
.header .status {
  font-size: 13px;
  color: var(--text-muted);
}
.header .dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  background: var(--green);
}
.header .dot.off { background: var(--red); }
.main { display: flex; flex: 1; overflow: hidden; }
.sidebar {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-top {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.new-chat-btn {
  width: 100%;
  padding: 10px 16px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}
.new-chat-btn:hover { opacity: 0.85; }
.conversations-header {
  padding: 12px 16px 8px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.conversations-header button {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
}
.conversations-header button:hover { color: var(--text); }
.conversations-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
}
.conversation-item {
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
  color: var(--text);
  transition: background 0.15s;
}
.conversation-item:hover { background: var(--surface-2); }
.conversation-item.active { background: var(--accent-dim); border-left: 3px solid var(--accent); }
.conversation-item .title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.conversation-item .delete-btn {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
}
.conversation-item:hover .delete-btn { opacity: 1; }
.conversation-item .delete-btn:hover { color: var(--red); background: rgba(255,107,107,0.1); }
.sidebar-sections {
  border-top: 1px solid var(--border);
  overflow-y: auto;
  max-height: 40vh;
}
.panel { border-bottom: 1px solid var(--border); }
.panel-header {
  padding: 12px 16px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}
.panel-header:hover { background: var(--surface-2); }
.panel-body { padding: 0 16px 12px; }
.panel-body.hide { display: none; }
.health-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.health-item {
  background: var(--surface-2);
  border-radius: 6px;
  padding: 10px;
  text-align: center;
}
.health-item .label { font-size: 11px; color: var(--text-muted); }
.health-item .value {
  font-size: 20px;
  font-weight: 700;
  font-family: var(--font-mono);
}
.health-item .bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.health-item .bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s ease;
}
.item-list { list-style: none; }
.item-list li {
  padding: 8px 12px;
  border-radius: 4px;
  margin-bottom: 4px;
  background: var(--surface-2);
  font-size: 13px;
  display: flex;
  justify-content: space-between;
}
.item-list li .badge {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 10px;
  background: var(--accent-dim);
  color: var(--accent);
}
.chat-area { flex: 1; display: flex; flex-direction: column; }
.messages { flex: 1; overflow-y: auto; padding: 20px; }
.message { margin-bottom: 16px; max-width: 80%; animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { margin-left: auto; text-align: right; }
.message .role {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
}
.message .content {
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
/* Markdown rendered content */
.message .content p { margin: 0 0 8px; }
.message .content p:last-child { margin-bottom: 0; }
.message .content code {
  background: rgba(0,0,0,0.3);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
}
.message .content pre {
  background: #1a1a2e;
  border-radius: 8px;
  padding: 12px;
  margin: 8px 0;
  overflow-x: auto;
}
.message .content pre code {
  background: none;
  padding: 0;
  font-size: 13px;
  line-height: 1.5;
}
.message .content ul, .message .content ol {
  margin: 8px 0;
  padding-left: 24px;
}
.message .content li { margin: 4px 0; }
.message .content table {
  border-collapse: collapse;
  margin: 8px 0;
  width: 100%;
}
.message .content th, .message .content td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
}
.message .content th { background: rgba(0,0,0,0.2); }
.message .content blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-muted);
}
.message.assistant .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px 12px 12px 4px;
}
.message.user .content {
  background: var(--accent-dim);
  border: 1px solid rgba(78, 205, 196, 0.3);
  border-radius: 12px 12px 4px 12px;
}
.message.thinking .content {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-style: italic;
}
.message.error .content {
  background: rgba(255, 107, 107, 0.1);
  border: 1px solid rgba(255, 107, 107, 0.3);
  color: var(--red);
}
.input-area {
  padding: 16px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 12px;
}
.input-area textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-size: 14px;
  font-family: var(--font-sans);
  resize: none;
  outline: none;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 0 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.input-area button:hover { opacity: 0.85; }
.input-area button:disabled { opacity: 0.4; }
.event-item {
  padding: 6px 10px;
  margin-bottom: 4px;
  background: var(--surface-2);
  border-radius: 4px;
  font-size: 12px;
  font-family: var(--font-mono);
}
.event-item .time { color: var(--text-muted); }
.event-item .type { color: var(--accent); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>Plector</h1>
  <div class="status">
    <span class="dot" id="ws-dot"></span>
    <span id="ws-status">连接中...</span>
    &nbsp;|&nbsp;
    <span id="llm-provider">--</span>
    &nbsp;|&nbsp;
    <span id="tools-count">-- tools</span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-top">
      <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
    </div>
    <div class="conversations-header">
      <span>历史对话</span>
      <button onclick="loadConversations()" title="刷新">&#8635;</button>
    </div>
    <div class="conversations-list" id="conversations-list">
      <!-- 对话列表将动态加载 -->
    </div>
    <div class="sidebar-sections">
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">系统健康 <span>▼</span></div>
        <div class="panel-body">
          <div class="health-grid">
            <div class="health-item">
              <div class="label">CPU</div>
              <div class="value" id="cpu-value">--</div>
              <div class="bar"><div class="bar-fill" id="cpu-bar"></div></div>
            </div>
            <div class="health-item">
              <div class="label">内存</div>
              <div class="value" id="mem-value">--</div>
              <div class="bar"><div class="bar-fill" id="mem-bar"></div></div>
            </div>
            <div class="health-item">
              <div class="label">磁盘</div>
              <div class="value" id="disk-value">--</div>
              <div class="bar"><div class="bar-fill" id="disk-bar"></div></div>
            </div>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">技能 <span>▼</span></div>
        <div class="panel-body">
          <ul class="item-list" id="skills-list"></ul>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">工具 <span>▼</span></div>
        <div class="panel-body">
          <ul class="item-list" id="tools-list"></ul>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header" onclick="togglePanel(this)">事件日志 <span>▼</span></div>
        <div class="panel-body" style="max-height:200px;overflow-y:auto;">
          <div id="events-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="message assistant">
        <div class="role">Plector</div>
        <div class="content">你好！我是 Plector，有什么可以帮你的？</div>
      </div>
    </div>
    <div class="input-area">
      <textarea id="input" placeholder="输入消息..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
let ws = null;
let timer = null;
let currentSessionId = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = () => {
    document.getElementById('ws-dot').className = 'dot';
    document.getElementById('ws-status').textContent = '已连接';
    if (timer) { clearInterval(timer); timer = null; }
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'thinking') addMsg('assistant', msg.content, 'thinking');
    else if (msg.type === 'response') { removeThinking(); addMsg('assistant', msg.content); }
    else if (msg.type === 'error') { removeThinking(); addMsg('error', msg.content, 'error'); }
    document.getElementById('send-btn').disabled = false;
  };
  ws.onclose = () => {
    document.getElementById('ws-dot').className = 'dot off';
    document.getElementById('ws-status').textContent = '已断开';
    if (!timer) timer = setInterval(connect, 3000);
  };
}

async function newChat() {
  // 清空当前消息
  const messagesBox = document.getElementById('messages');
  messagesBox.innerHTML = '';
  messagesBox.innerHTML = '<div class="message assistant"><div class="role">Plector</div><div class="content">开始新对话了！有什么可以帮你的？</div></div>';
  // 切换到新会话
  const res = await fetch('/api/conversations', { method: 'POST' });
  const data = await res.json();
  currentSessionId = data.session_id;
  // 更新历史列表
  loadConversations();
}

async function loadConversations() {
  try {
    const res = await fetch('/api/conversations');
    const data = await res.json();
    const list = document.getElementById('conversations-list');
    if (!data.conversations || data.conversations.length === 0) {
      list.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:12px;">暂无对话历史</div>';
      return;
    }
    list.innerHTML = data.conversations.map(c => {
      const active = c.session_id === currentSessionId ? 'active' : '';
      return '<div class="conversation-item ' + active + '" onclick="switchConversation(\'' + c.session_id + '\')">' +
        '<span class="title" id="title-' + c.session_id + '" onclick="event.stopPropagation();startRename(\'' + c.session_id + '\')">' + esc(c.title) + '</span>' +
        '<button class="delete-btn" onclick="event.stopPropagation();deleteConversation(\'' + c.session_id + '\')">&#10005;</button>' +
        '</div>';
    }).join('');
  } catch(e) {
    console.error('加载对话失败:', e);
  }
}

async function switchConversation(sessionId) {
  if (sessionId === currentSessionId) return;
  // 加载该对话的消息
  try {
    const res = await fetch('/api/conversations/' + sessionId);
    const data = await res.json();
    const messagesBox = document.getElementById('messages');
    messagesBox.innerHTML = '';
    if (data.messages && data.messages.length > 0) {
      data.messages.forEach(m => {
        if (m.role === 'user') {
          addMsg('user', m.content);
        } else if (m.role === 'assistant') {
          addMsg('assistant', m.content);
        }
      });
    } else {
      messagesBox.innerHTML = '<div class="message assistant"><div class="role">Plector</div><div class="content">对话已加载。继续之前的话题？</div></div>';
    }
    currentSessionId = sessionId;
    loadConversations(); // 更新高亮
  } catch(e) {
    console.error('加载对话失败:', e);
  }
}

async function deleteConversation(sessionId) {
  if (!confirm('确定删除这个对话？')) return;
  try {
    await fetch('/api/conversations/' + sessionId, { method: 'DELETE' });
    if (currentSessionId === sessionId) {
      currentSessionId = null;
      document.getElementById('messages').innerHTML = '<div class="message assistant"><div class="role">Plector</div><div class="content">对话已删除。开始新对话？</div></div>';
    }
    loadConversations();
  } catch(e) {
    console.error('删除对话失败:', e);
  }
}

let renamingSessionId = null;

function startRename(sessionId) {
  if (renamingSessionId === sessionId) return;
  renamingSessionId = sessionId;
  const titleSpan = document.getElementById('title-' + sessionId);
  const currentTitle = titleSpan.textContent;
  titleSpan.innerHTML = '<input type="text" id="rename-input" value="' + esc(currentTitle) + '" ' +
    'onkeydown="if(event.key===\'Enter\')saveRename(\'' + sessionId + '\');if(event.key===\'Escape\')cancelRename()" ' +
    'onclick="event.stopPropagation()" style="width:100%;padding:2px 4px;border-radius:4px;border:1px solid var(--accent);background:var(--bg);color:var(--text);font-size:13px;">';
  document.getElementById('rename-input').focus();
  document.getElementById('rename-input').select();
}

async function saveRename(sessionId) {
  const input = document.getElementById('rename-input');
  const newTitle = input.value.trim();
  if (!newTitle) return;
  try {
    await fetch('/api/conversations/' + sessionId, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({title: newTitle})
    });
    renamingSessionId = null;
    loadConversations();
  } catch(e) {
    console.error('重命名失败:', e);
  }
}

function cancelRename() {
  renamingSessionId = null;
  loadConversations();
}

function sendMsg() {
  const input = document.getElementById('input');
  const content = input.value.trim();
  if (!content || !ws || ws.readyState !== 1) return;
  addMsg('user', content);
  ws.send(JSON.stringify({ content, session_id: currentSessionId }));
  input.value = '';
  document.getElementById('send-btn').disabled = true;
}

function addMsg(role, content, type) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ' + (type || role);
  const label = role === 'user' ? '你' : role === 'error' ? '错误' : 'Plector';
  div.innerHTML = '<div class="role">' + label + '</div><div class="content">' + renderContent(content) + '</div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function removeThinking() {
  const t = document.querySelector('.message.thinking');
  if (t) t.remove();
}

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderContent(text) {
  // HTML 转义（防止 XSS）
  let escaped = esc(text);
  // Markdown → HTML
  let html = marked.parse(escaped);
  // 代码高亮
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = html;
  tempDiv.querySelectorAll('pre code').forEach(block => {
    const lang = block.className.replace('language-', '') || block.className;
    if (lang && hljs.getLanguage(lang)) {
      try {
        block.innerHTML = hljs.highlight(block.textContent, {language: lang}).value;
        block.className = 'hljs language-' + lang;
      } catch(e) {}
    } else {
      // 无语言指定，整体高亮
      try {
        block.innerHTML = hljs.highlightAuto(block.textContent).value;
      } catch(e) {}
    }
  });
  return tempDiv.innerHTML;
}

function togglePanel(header) {
  header.nextElementSibling.classList.toggle('hide');
}

async function fetchApi(url) {
  try { return await (await fetch(url)).json(); } catch { return null; }
}

function barColor(v) { return v < 60 ? 'var(--green)' : v < 80 ? 'var(--yellow)' : 'var(--red)'; }

async function updateHealth() {
  const d = await fetchApi('/api/health');
  if (!d) return;
  ['cpu', 'mem', 'disk'].forEach(k => {
    document.getElementById(k + '-value').textContent = d[k === 'mem' ? 'memory' : k] + '%';
    const bar = document.getElementById(k + '-bar');
    bar.style.width = d[k === 'mem' ? 'memory' : k] + '%';
    bar.style.background = barColor(d[k === 'mem' ? 'memory' : k]);
  });
}

async function updateSkills() {
  const d = await fetchApi('/api/skills');
  if (!d) return;
  document.getElementById('skills-list').innerHTML = d.skills.map(s =>
    '<li><span>' + s.name + '</span><span class="badge">' + s.tools.length + ' tools</span></li>'
  ).join('');
}

async function updateTools() {
  const d = await fetchApi('/api/tools');
  if (!d) return;
  document.getElementById('tools-list').innerHTML = [
    ...d.local.map(t => '<li><span>' + t.name + '</span><span class="badge">local</span></li>'),
    ...d.mcp.map(t => '<li><span>' + t.name + '</span><span class="badge">mcp</span></li>'),
  ].join('');
  document.getElementById('tools-count').textContent = d.total + ' tools';
}

async function updateConfig() {
  const d = await fetchApi('/api/config');
  if (d) document.getElementById('llm-provider').textContent = d.llm_provider.toUpperCase();
}

async function updateEvents() {
  const d = await fetchApi('/api/events');
  if (!d) return;
  document.getElementById('events-list').innerHTML = d.events.slice(-20).reverse().map(e => {
    const t = e.time.split('T')[1].split('.')[0];
    return '<div class="event-item"><span class="time">' + t + '</span> <span class="type">' + e.type + '</span></div>';
  }).join('');
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

connect();
loadConversations();
updateHealth(); updateSkills(); updateTools(); updateConfig();
setInterval(updateHealth, 5000);
setInterval(updateEvents, 3000);
</script>
</body>
</html>
